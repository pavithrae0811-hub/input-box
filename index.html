<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Box Format</title>
</head>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: white;
    padding: 25px;
    width: 350px;
    border-radius: 10px;
  }

  h2 {
    text-align: center;
    color: #333;
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
  }
button {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background-color: #0056b3;
  }
</style>

<div class="container">
  <h2>User Information </h2>

 <form >
  
    <label>Name:</label>
    <input type="text"  id= "name"placeholder="Enter your name" required>

    <label>Age:</label>
    <input type="number" id="age" placeholder="Enter your age" required>

    <label>Email:</label>
    <input type="email" id="email" placeholder="Enter your email" required>

    <label>User ID:</label>
    <input type="text" id="user-id" placeholder="Enter your user ID" required>

    <label>Password:</label>
    <input type="password" id="password" placeholder="Enter your password" required>

    <label>Date of Birth:</label>
    <input type="date" id="dob" placeholder="Enter your date of birth" required>

    <label>Phone Number:</label>
    <input type="tel" id="phone" placeholder="Enter your phone number" required>

    <label>Address:</label>
    <input type="text" id="address" placeholder="Enter your address" required>

    <button type="submit">Submit</button>

  </form>
</div>
<script>
      document.querySelector('form').addEventListener('submit', function(event) {
      event.preventDefault(); // Prevent form submission

     let  name = document.getElementById('name').value;
     let age = document.getElementById('age').value;
     let email = document.getElementById('email').value;
     let userId = document.getElementById('user-id').value;
     let  password = document.getElementById('password').value;
     let dob = document.getElementById('dob').value;
     let  phone = document.getElementById('phone').value;
     let address = document.getElementById('address').value;

      alert('Form submitted successfully! \nName: ' + name + '\n' + 'Age: ' + age + '\n' + 'Email: ' + email + '\n' + 'User ID: ' + userId + '\n' + 'Password: ' + password + '\n' + 'Date of Birth: ' + dob + '\n' + 'Phone Number: ' + phone + '\n' + 'Address: ' + address);
    });

</script>
</body>
</html>
